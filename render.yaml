services:
  - type: web
    name: lerngruppen-finder
    env: docker
    plan: starter
    dockerfile_path: Dockerfile
    autoDeploy: true
    # Persistente Disk: die DB liegt hier und ueberlebt jeden Deploy.
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: "8080"
      # DB liegt auf der persistenten Disk -> bleibt ueber Deploys erhalten.
      - key: DATABASE_PATH
        value: /data/users.db
      # Beim allerersten Start (leere Disk) mit dem seed.db-Stand befuellen.
      - key: SEED_DB_IF_EMPTY
        value: "1"
      # OpenAI-Key fuer die Zeugnis-Auslesung. sync: false -> Wert wird im
      # Render-Dashboard gesetzt (NICHT im Repo). Ohne diesen Wert geht keine
      # Anfrage an GPT durch (no_api_key).
      - key: OPENAI_API_KEY
        sync: false
