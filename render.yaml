services:
  - type: web
    name: lerngruppen-finder
    env: docker
    plan: starter
    dockerfile_path: Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8080"
      # Setzt die DB bei jedem Deploy auf den committeten seed.db-Stand zurueck.
      - key: RESET_DB_FROM_SEED
        value: "1"
