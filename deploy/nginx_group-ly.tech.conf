server {
    listen 80;
    server_name group-ly.tech www.group-ly.tech;

    # Proxy requests to gunicorn running on localhost:8000
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    # Optional: serve static files directly from the repo 'web' folder
    # Uncomment and adjust path if you want nginx to serve static assets
    # location /static/ {
    #     alias /path/to/lerngruppen-finder/web/;
    # }

    client_max_body_size 10M;
}
