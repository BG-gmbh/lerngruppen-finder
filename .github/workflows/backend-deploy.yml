name: Deploy Backend (Cloudflare Containers)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      # Builds the container image from ./Dockerfile and deploys the Worker.
      # Secrets (MONGODB_URI, FLASK_SECRET_KEY, OPENAI_API_KEY, SMTP_*) are set
      # once via `wrangler secret put` and are NOT managed here.
      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
