name: Deploy Backend (Render)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Optional: Render deployt bei autoDeploy:true ohnehin automatisch bei jedem
# Push. Dieser Workflow stoesst den Deploy zusaetzlich explizit an (falls
# autoDeploy im Dashboard aus ist). Benoetigt die Secrets RENDER_API_KEY und
# RENDER_SERVICE_ID.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"
