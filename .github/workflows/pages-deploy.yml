name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Optional: build flutter web straight into the published folder.
      - name: Build Flutter (optional)
        if: env.BUILD_FLUTTER == 'true'
        run: |
          sudo snap install flutter --classic || true
          flutter --version
          cd flutter_app
          flutter pub get
          flutter build web --release
          rm -rf docs/*
          cp -r build/web/* docs/

      - name: Install Wrangler
        run: npm install -g wrangler

      # The static site lives in flutter_app/docs (index.html, js/, css/, ...).
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy flutter_app/docs --project-name=lerngruppen-finder --branch=main --commit-dirty=true
