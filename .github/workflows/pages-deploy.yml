name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Optional: build flutter web and copy into docs
      - name: Build Flutter (optional)
        if: env.BUILD_FLUTTER == 'true'
        run: |
          sudo snap install flutter --classic || true
          flutter --version
          cd flutter_app
          flutter pub get
          flutter build web --release
          rm -rf ../docs/*
          cp -r build/web/* ../docs/

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler pages deploy docs --project-name=lerngruppen-finder --branch=main --commit-dirty=true
